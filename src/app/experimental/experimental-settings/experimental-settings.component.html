<p-button
  icon="pi pi-wrench"
  [rounded]="true"
  [text]="true"
  [raised]="true"
  pTooltip="Experimental features"
  tooltipPosition="bottom"
  (onClick)="popover.toggle($event)"
></p-button>
<p-popover #popover>
  <div class="flex flex-col gap-3 p-2" style="min-width: 18rem; max-width: 24rem">
    <app-labelled-switch
      [checked]="flags.experimentalEnabled()"
      (checkedChange)="flags.setExperimentalEnabled($event)"
      >Experimental features</app-labelled-switch
    >
    <small>
      Unfinished features under active development. They may be slow, unstable
      or give unreliable results.
    </small>
    <ul class="flex flex-col gap-1 m-0 pl-4">
      @for (feature of features; track feature.flag) {
        <li>
          <b>{{ feature.label }}</b>
          <small> — {{ feature.description }}</small>
        </li>
      }
    </ul>
  </div>
</p-popover>
