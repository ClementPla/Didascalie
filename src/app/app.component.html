<p-toolbar>
  <ng-template #start>
    <span class="toolbar"> Annotator </span>
    @if(isProjectStarted()){
    <ng-container>
      <p-divider layout="vertical" />
      <span class="toolbar">
        {{ projectService.projectName() }}
      </span>
    </ng-container>
    }
  </ng-template>

  <ng-template #center>
    <p class="flex gap-8">
      <p-button
        routerLink="project-configuration/"
        icon="pi pi-home"
        [rounded]="true"
        [text]="true"
        [raised]="true"
      >
      </p-button>
      <p-button
        #galleryButton
        routerLink="gallery/"
        icon="pi pi-list"
        [rounded]="true"
        [text]="true"
        [disabled]="!isProjectStarted()"
        [raised]="true"
      >
      </p-button>

      <p-button
        routerLink="editor/"
        icon="pi pi-pencil"
        [rounded]="true"
        [text]="true"
        [disabled]="!isProjectStarted()"
        [raised]="true"
      >
      </p-button>
      <p-button
        routerLink="export/"
        icon="pi pi-file-export"
        [rounded]="true"
        [text]="true"
        [disabled]="!isProjectStarted()"
        [raised]="true"
      >
      </p-button>
      <p-button
        routerLink="testing-zone/"
        icon="pi pi-lightbulb"
        [rounded]="true"
        [text]="true"
        [raised]="true"
      >
      </p-button>
    </p>
  </ng-template>
  <ng-template pTemplate="end"> </ng-template>
</p-toolbar>
@if(uiStateService.isLoading){
<app-loading> </app-loading>
} @if(uiStateService.showFpsCounter){
<app-fps-display></app-fps-display>
}
