<p-toolbar>
  <ng-template #start>
    <span class="toolbar"> Annotator </span>
    @if (isProjectStarted()) {
      <ng-container>
        <p-divider layout="vertical" />
        <span class="toolbar">
          {{ projectService.projectName() }}
        </span>
      </ng-container>
    }
  </ng-template>

  <ng-template #center>
    <p class="flex gap-8">
      <p-button
        routerLink="/"
        icon="pi pi-home"
        [rounded]="true"
        [text]="true"
        [raised]="true"
      ></p-button>
      <p-button
        #galleryButton
        routerLink="gallery/"
        icon="pi pi-list"
        [rounded]="true"
        [text]="true"
        [disabled]="!isProjectStarted()"
        [raised]="true"
      >
      </p-button>

      <p-button
        routerLink="editor/"
        icon="pi pi-pencil"
        [rounded]="true"
        [text]="true"
        [disabled]="!isProjectStarted()"
        [raised]="true"
      >
      </p-button>
      <p-button
        routerLink="registration/"
        icon="pi pi-map"
        [rounded]="true"
        [text]="true"
        [disabled]="!isProjectStarted()"
        [raised]="true"
      >
      </p-button>
      <p-button
        routerLink="export/"
        icon="pi pi-file-export"
        [rounded]="true"
        [text]="true"
        [disabled]="!isProjectStarted()"
        [raised]="true"
      >
      </p-button>
    </p>
  </ng-template>
  <ng-template pTemplate="end"> </ng-template>
</p-toolbar>
@if (uiStateService.isLoading) {
  <app-loading> </app-loading>
}
@if (uiStateService.showFpsCounter) {
  <app-fps-display></app-fps-display>
}
<!-- <app-testing></app-testing> -->
<main class="route-host">
  <router-outlet></router-outlet>
</main>

<!-- App-wide notifications -->
<p-toast position="bottom-right"></p-toast>

<!-- Blocking critical-error screen (non-recoverable failures) -->
@if (notificationService.criticalError(); as message) {
  <div class="critical-error">
    <div class="critical-error__panel">
      <i class="pi pi-exclamation-triangle"></i>
      <h2>Something went wrong</h2>
      <p>{{ message }}</p>
      <div class="critical-error__actions">
        <p-button label="Reload" icon="pi pi-refresh" (onClick)="reload()"></p-button>
        <p-button
          label="Dismiss"
          severity="secondary"
          [text]="true"
          (onClick)="notificationService.clearCriticalError()"
        ></p-button>
      </div>
    </div>
  </div>
}
