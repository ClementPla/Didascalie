<div
  #host
  class="viewport-pane"
  [style.cursor]="cursorStyle()"
  (mousedown)="onMouseDown($event)"
  (mousemove)="onMouseMove($event)"
  (mouseup)="onMouseUp()"
  (mouseleave)="onMouseLeave()"
  (wheel)="onWheel($event)"
>
  <canvas #canvas class="display-canvas"></canvas>

  @if (showWarpedImg()) {
    <img
      class="warped-moving-overlay"
      [src]="movingImageUrl!"
      [style.width.px]="movingNativeWidth"
      [style.height.px]="movingNativeHeight"
      [style.transform]="warpedTransform()!"
      alt=""
      draggable="false"
    />
  }

  <svg #svg class="interaction-svg" preserveAspectRatio="none">
    @if (shadowCursor(); as pt) {
      <g class="marker-group shadow-cursor" aria-hidden="true">
        <line
          [attr.x1]="pt.x - 5"
          [attr.y1]="pt.y - 5"
          [attr.x2]="pt.x + 5"
          [attr.y2]="pt.y + 5"
          stroke="#ffffff"
          stroke-width="1"
          stroke-dasharray="2,3"
          vector-effect="non-scaling-stroke"
          opacity="0.7"
        ></line>
        <line
          [attr.x1]="pt.x - 5"
          [attr.y1]="pt.y + 5"
          [attr.x2]="pt.x + 5"
          [attr.y2]="pt.y - 5"
          stroke="#ffffff"
          stroke-width="1"
          stroke-dasharray="2,3"
          vector-effect="non-scaling-stroke"
          opacity="0.7"
        ></line>
      </g>
    }
    @for (pair of pairs(); track pair.id; let i = $index) {
      @let point = pointFor(pair);
      @let isHovered = hoveredPairId() === pair.id;
      @let isOther = hoveredPairId() !== null && hoveredPairId() !== pair.id;
      <g
        class="marker-group reticle"
        [class.hovered]="isHovered"
        [class.dimmed]="isOther"
        [attr.transform]="markerTransform(point)"
      >
        <g class="reticle-scale">
          <path class="reticle-halo" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-halo" cx="0" cy="0" r="6"></circle>
          <path
            class="reticle-mark"
            [attr.stroke]="colorForIndex(i)"
            d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"
          ></path>
          <circle
            class="reticle-mark"
            cx="0"
            cy="0"
            r="6"
            [attr.stroke]="colorForIndex(i)"
          ></circle>
        </g>
        <text x="13" y="-11" [attr.fill]="colorForIndex(i)" class="pair-label">
          {{ i + 1 }}
        </text>
      </g>
    }

    @if (showPendingRef) {
      @let pending = pendingRef()!;
      <g class="marker-group reticle tentative pending" [attr.transform]="markerTransform(pending)">
        <g class="reticle-scale">
          <path class="reticle-halo" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-halo reticle-ring" cx="0" cy="0" r="6"></circle>
          <path class="reticle-mark" stroke="#00ffff" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-mark reticle-ring" cx="0" cy="0" r="6" stroke="#00ffff"></circle>
        </g>
      </g>
    }
    @if (showPendingMoving) {
      @let pending = pendingMoving()!;
      <g class="marker-group reticle tentative pending" [attr.transform]="markerTransform(pending)">
        <g class="reticle-scale">
          <path class="reticle-halo" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-halo reticle-ring" cx="0" cy="0" r="6"></circle>
          <path class="reticle-mark" stroke="#00ffff" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-mark reticle-ring" cx="0" cy="0" r="6" stroke="#00ffff"></circle>
        </g>
      </g>
    }

    @if (showPredictedRef) {
      @let pred = predictedRef()!;
      <g class="marker-group reticle tentative predictive-guide" [attr.transform]="markerTransform(pred)">
        <g class="reticle-scale">
          <path class="reticle-halo" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-halo reticle-ring" cx="0" cy="0" r="6"></circle>
          <path class="reticle-mark" stroke="#00ffff" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-mark reticle-ring" cx="0" cy="0" r="6" stroke="#00ffff"></circle>
        </g>
      </g>
    }

    @if (showPredictedMoving) {
      @let pred = predictedMoving()!;
      <g class="marker-group reticle tentative predictive-guide" [attr.transform]="markerTransform(pred)">
        <g class="reticle-scale">
          <path class="reticle-halo" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-halo reticle-ring" cx="0" cy="0" r="6"></circle>
          <path class="reticle-mark" stroke="#00ffff" d="M0 -9V-15 M0 9V15 M-9 0H-15 M9 0H15"></path>
          <circle class="reticle-mark reticle-ring" cx="0" cy="0" r="6" stroke="#00ffff"></circle>
        </g>
      </g>
    }
  </svg>
  @if (warpedDiagnostic(); as reason) {
    <div class="diagnostic-warning">
      <i class="pi pi-exclamation-triangle"></i>
      Cannot render warp: {{ reason }}
    </div>
  }

  @if (label) {
    <div class="pane-tag">{{ label }}</div>
  }
</div>
