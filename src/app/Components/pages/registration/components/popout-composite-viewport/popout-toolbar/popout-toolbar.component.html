<!-- popout-toolbar.component.html -->
<div class="popout-toolbar">
  <div class="mode-buttons" role="tablist" aria-label="Visualization mode">
    @for (opt of modeOptions; track opt.value) {
      <p-button
        [label]="opt.label"
        [icon]="opt.icon"
        size="small"
        [severity]="mode() === opt.value ? 'primary' : 'secondary'"
        (click)="setMode(opt.value)"
        [attr.aria-selected]="mode() === opt.value"
        role="tab"
      ></p-button>
    }
  </div>

  <div class="mode-controls">
    @if (mode() === 'overlay') {
      <div class="slider-control">
        <label for="popout-opacity-slider">Opacity</label>
        <p-slider
          id="popout-opacity-slider"
          [(ngModel)]="overlayOpacity"
          [min]="0" [max]="1" [step]="0.01"
          style="width: 140px"
        ></p-slider>
        <span class="slider-val">{{ overlayOpacity * 100 | number:'1.0-0' }}%</span>
      </div>
    }

    @if (mode() === 'checkerboard') {
      <div class="slider-control">
        <label for="popout-tile-slider">Tile size</label>
        <p-slider
          id="popout-tile-slider"
          [(ngModel)]="checkerTileSize"
          [min]="16" [max]="256" [step]="8"
          style="width: 140px"
        ></p-slider>
        <span class="slider-val">{{ checkerTileSize }} px</span>
      </div>
    }
  </div>
</div>
