<p-card
  (dblclick)="openEditor()"
  [ngClass]="{ panel_selected: true }"
  (click)="select($event)"
  [styleClass]="getCardStyleClass()"
>
  <div class="align-middle flex justify-center m-1">
    <img
      class="aspect-auto flex flex-col hover:brightness-150 hover:contrast-75 hover:scale-110 rounded-md"
      [ngStyle]="getStyle()"
      [src]="imagePath"
      [width]="imgSize"
      loading="lazy"
    />
  </div>
  <p class="text-center">
    <b>
      {{ id }}
    </b>
    {{ imageName }}
  </p>
  <div *ngIf="projectService.isClassification">
    <ng-container
      *ngFor="let task of labelsService.listClassificationTasks; let i = index"
    >
      <small *ngIf="classificatorService.multiclassChoices.get(imageName)![i]">
        <b>{{ task.taskName }}: </b>
        {{ classificatorService.multiclassChoices.get(imageName)![i] }}
      </small>
    </ng-container>
  </div>
</p-card>
