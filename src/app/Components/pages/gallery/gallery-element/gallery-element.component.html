<div
  class="cursor-pointer duration-200 gallery-element hover:scale-105 relative transition-all"
  [class]="getCardStyleClass()"
  [style.width.px]="imgSize"
  (dblclick)="openEditor()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <!-- Thumbnail Image -->
  <div
    class="overflow-hidden relative rounded-t-lg"
    [style.height.px]="imgSize"
    [style.background]="'var(--p-content-background)'"
  >
    @if (isLoading) {
      <div class="absolute flex inset-0 items-center justify-center">
        <i class="pi pi-spin pi-spinner text-2xl" [style.color]="'var(--p-text-muted-color)'"></i>
      </div>
    } @else if (loadError && !imagePath) {
      <div class="absolute flex inset-0 items-center justify-center" [style.background]="'var(--p-content-hover-background)'">
        <i class="pi pi-image text-4xl" [style.color]="'var(--p-text-muted-color)'"></i>
      </div>
    } @else {
      <img
        [src]="imagePath"
        [alt]="displayTitle"
        class="h-full object-cover w-full"
        [class.animate-fade-in]="isFading"
      />
    }

    <!-- Status Badge -->
    <span
      class="absolute font-medium left-2 px-2 py-1 rounded-full text-white text-xs top-2"
      [ngClass]="getStatusBadgeClass()"
    >
      {{ getStatusLabel() }}
    </span>

    <!-- Frame Count Badge -->
    @if (hasMultipleFrames) {
      <span class="absolute bg-blue-500 font-medium px-2 py-1 right-2 rounded-full text-white text-xs top-2">
        {{ frameCount }} frames
      </span>
    }

    <!-- Selection Checkbox -->
    <div
      class="absolute border-2 bottom-2 flex h-6 items-center justify-center right-2 rounded transition-colors w-6"
      [class.bg-primary]="selected"
      [class.border-primary]="selected"
      [class.bg-white]="!selected"
      [class.border-gray-300]="!selected"
      (click)="select($event)"
    >
      @if (selected) {
        <i class="pi pi-check text-sm text-white"></i>
      }
    </div>

    <!-- Hover Preview Indicator -->
    @if (hasMultipleFrames && isLooping) {
      <div class="absolute bottom-2 flex gap-1 left-2">
        @for (fId of frameIds; track fId) {
          <span
            class="h-2 rounded-full w-2"
            [ngClass]="{'bg-white': frameIds.indexOf(fId) === currentFrameIndex, 'bg-white/50': frameIds.indexOf(fId) !== currentFrameIndex}"
          ></span>
        }
      </div>
    }
  </div>

  <!-- Title -->
  <div class="p-2 rounded-b-lg">
    <p class="font-medium text-sm truncate" [title]="displayTitle">
      {{ displayTitle }}
    </p>
  </div>
</div>
