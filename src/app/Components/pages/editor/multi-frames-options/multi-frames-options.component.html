@if (totalFrames > 1) {
  <p-panel header="Navigation" [toggleable]="true" [collapsed]="false">
    <!-- Frame slider (if multiple frames in current sequence) -->
    @if (totalFrames > 1) {
      <div class="frame-slider">
        <label>Frame: {{ progress.current }} / {{ progress.total }}</label>
        <p-slider
          [(ngModel)]="currentFrame"
          [min]="0"
          [max]="maxFrameIndex"
          [step]="1"
          (onChange)="multiFrameChanged()"
        />
      </div>

      <div class="frame-info">
        <small>Use ↑/↓ arrow keys to navigate frames</small>
      </div>

      <div class="frame-actions">
        <p-button
          label="Propagate labels…"
          icon="pi pi-copy"
          severity="secondary"
          [text]="true"
          [fluid]="true"
          (click)="propagateRequested.emit()"
        />
      </div>
    }
  </p-panel>
}
