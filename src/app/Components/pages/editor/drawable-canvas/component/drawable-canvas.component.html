
<div
  class="grid grid-cols-[auto_1fr] grid-rows-[auto_1fr] max-screen-available overflow-hidden rounded-lg w-full"
>
  <!-- Corner -->
  <div
    class="invisible ruler"
    [style.height.px]="rulerSize"
    [style.width.px]="rulerSize"
  ></div>

  <!-- Top ruler -->
  <div
    class="overflow-x-clip relative ruler ruler--x"
    [style.height.px]="rulerSize"
    [ngStyle]="getRulerTicks('x')"
  >
    <p class="absolute viewBoxMarker w-fit" [style.left.px]="viewBox.xmin">0</p>
    <p class="absolute viewBoxMarker w-fit" [style.left.px]="cursor.x">
      {{ zoomPanService.currentPixel.x }}
    </p>
    <p class="absolute viewBoxMarker w-fit" [style.left.px]="viewBox.xmax">
      {{ orchestrator.width }}
    </p>
  </div>

  <!-- Left ruler -->
  <div
    class="relative ruler ruler--y"
    [style.width.px]="rulerSize"
    [ngStyle]="getRulerTicks('y')"
  >
    @if (viewBox.ymin >= 0) {
      <p class="absolute viewBoxMarkerHorizontal" [style.top.px]="viewBox.ymin">0</p>
    }
    @if (cursor.y > 0) {
      <p class="absolute viewBoxMarkerHorizontal" [style.top.px]="cursor.y">
        {{ zoomPanService.currentPixel.y }}
      </p>
    }
    <p class="absolute viewBoxMarkerHorizontal" [style.top.px]="viewBox.ymax">
      {{ orchestrator.height }}
    </p>
  </div>

  <!-- Viewport (fills the grid cell; canvases fill the viewport) -->
  <div
    class="canvas-viewport overflow-hidden relative"
    [ngClass]="{
      'fixed inset-0 z-[2500]': isFullscreen
    }"
    #viewport
  >
    <app-svgelements
      #svg
      class="absolute h-full inset-0 pointer-events-none w-full z-30"
    ></app-svgelements>

    <canvas
      appCanvasInput
      #imageCanvas
      class="absolute crisp-edges h-full inset-0 touch-none w-full z-10"
      [ngClass]="{
        'cursor-grab': editorService.canPan(),
        'cursor-none': !editorService.canPan() && editorService.isToolWithBrushSize() && isCursorInsideImage,
        'cursor-default': !editorService.canPan() && editorService.isToolWithBrushSize() && !isCursorInsideImage,
        'cursor-crosshair': !editorService.canPan() && !editorService.isToolWithBrushSize()
      }"
      (canvasMove)="onMouseMove($any($event))"
      (mouseleave)="isCursorInsideImage = false"
      (wheel)="wheel($event)"
    ></canvas>

    <canvas
      #labelCanvas
      class="absolute crisp-edges h-full inset-0 pointer-events-none w-full z-20"
      [style.opacity]="editorService.labelOpacity"
    ></canvas>

    @if (editorService.isToolWithBrushSize() && isCursorInsideImage) {
      <div class="cursor" [ngStyle]="getCursorStyle()"></div>
    }

    <div
      class="absolute inset-0 skeleton z-50"
      [ngClass]="{ invisible: !isLoading, visible: isLoading }"
    ></div>

    <!-- Floating buttons -->
    <div class="absolute flex gap-2 items-center left-5 top-2 z-40">
      @if (!isFullscreen) {
        <p-button
          pRipple [rounded]="true" [raised]="true"
          (click)="switchFullScreen()"
          icon="pi pi-window-maximize" severity="help"
        ></p-button>
      } @else {
        <p-button
          pButton pRipple [rounded]="true" [raised]="true"
          (click)="switchFullScreen()"
          icon="pi pi-window-minimize" severity="help"
        ></p-button>
      }
      <p-button
        [rounded]="true" [raised]="true"
        (click)="zoomPanService.resetZoomAndPan(true, true)"
        icon="pi pi-refresh" severity="help"
      ></p-button>
    </div>
  </div>
</div>
