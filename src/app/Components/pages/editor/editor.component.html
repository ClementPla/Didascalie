<p-dialog
  header="Downloading Resources"
  [(visible)]="displayDownloadDialog"
  [modal]="true"
  [closable]="false"
  [dismissableMask]="false"
>
  <p-progressbar [value]="downloadProgress" />
</p-dialog>

<app-toolbar></app-toolbar>
<div class="editor flex gap-8 justify-around overflow-hidden relative w-full">
  <app-quick-access-menu #quickAccessMenu></app-quick-access-menu>
  
  @if(shouldShowLabels){
    <app-labels class="flex-shrink-0 max-w-128"></app-labels>
  }
  
  <!-- Center column: canvas - should take remaining space but not overflow -->
  <div class="flex-1 min-w-0 overflow-hidden">
    <app-drawable-canvas class="block h-full overflow-hidden w-full"></app-drawable-canvas>
    <p-metergroup [value]="progressItems"></p-metergroup>
  </div>
  
  <!-- Right column: tools - fixed width, should not be pushed out -->
  <div class="flex flex-col flex-shrink-0 gap-4 overflow-y-auto w-96">
    <app-tool-setting></app-tool-setting>
    <app-multi-frames-options
      (changeOfFrame)="changedOfFrame($event)"
    ></app-multi-frames-options>
    <p-panel header="Save" class="w-96">
      <p class="flex justify-center">
        <p-button (onClick)="navigatePrevious()">Previous</p-button>
        <p-button (onClick)="save()" pTooltip="Ctrl+S">Save</p-button>
        <p-button (onClick)="navigateNext()">Next</p-button>
      </p>
    </p-panel>
  </div>
</div>
