<app-editor-toolbar></app-editor-toolbar>
<div class="editor flex flex-1 gap-4 min-h-0 overflow-hidden relative w-full xl:gap-8">
  <app-quick-access-menu #quickAccessMenu></app-quick-access-menu>
  @if (shouldShowLabels) {
    <app-labels class="min-w-0 max-w-[32rem] overflow-y-auto"></app-labels>
  }
  <!-- Center column -->
  <div class="flex flex-1 flex-col min-h-0 min-w-0 overflow-hidden relative">
    <app-drawable-canvas
      class="block flex-1 min-h-0 overflow-hidden w-full"
    ></app-drawable-canvas>
    <!-- Progress indicator - sticky at bottom -->
    <div
      class="backdrop-blur-sm bg-black/70 bottom-0 left-0 p-2 right-0 sticky z-10"
    >
      <div class="flex gap-4 items-center justify-between text-sm text-white">
        <span class="font-semibold truncate">
          {{ currentSequenceName }}
        </span>
        <div class="flex flex-shrink-0 gap-4 items-center">
          <span class="text-white/70 text-xs">
            Frame {{ currentFrameIndex + 1 }}/{{ totalFrames }}
          </span>
          <span class="text-white/70 text-xs">
            Seq {{ currentSequenceIndex + 1 }}/{{ totalSequences }}
          </span>
          <div class="flex gap-2 items-center">
            <div class="bg-white/30 h-1.5 overflow-hidden rounded-full w-24">
              <div
                class="bg-green-400 duration-300 h-full transition-all"
                [style.width.%]="globalProgressPercent"
              ></div>
            </div>
            <span class="text-right text-xs w-10"
              >{{ globalProgressPercent }}%</span
            >
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Right column -->
  <div class="flex flex-col gap-4 min-h-0 overflow-y-auto shrink w-80 2xl:w-96">
    <app-tool-setting></app-tool-setting>
    <app-multi-frames-options
      (changeOfFrame)="changedOfFrame($event)"
    ></app-multi-frames-options>
    <p-panel header="Save" class="w-full">
      <p class="flex justify-center">
        <p-button (onClick)="navigatePrevious()">Previous</p-button>
        <p-button (onClick)="save()" pTooltip="Ctrl+S">Save</p-button>
        <p-button (onClick)="navigateNext()">Next</p-button>
      </p>
    </p-panel>
  </div>
</div>
